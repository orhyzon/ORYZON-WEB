<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORYZON | Innovación & Futuro</title>
    <style>
        :root { --primary: #5e17eb; --bg: #0b0b0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; background: rgba(255,255,255,0.03); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary); letter-spacing: 2px; }
        p { color: #888; margin-bottom: 30px; }
        .btn { 
            padding: 12px 30px; 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <p style="color: var(--primary); font-weight: bold; margin-bottom: 5px;">ORYZON SOLARPUNK DAWN</p>
        <h1>EL FUTURO NO SE ESPERA.</h1>
        <p>Hackea el presente, diseña el mañana.</p>
        <a href="mailto:orhyzon@gmail.com" class="btn">Contactar</a>
    </div>
</body>
</html>
